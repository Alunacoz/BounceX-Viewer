<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BounceX Viewer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="site-logo">
        Bounce
        <span>X</span>
      </a>
      <div class="header-search">
        <span class="search-icon">
          <svg
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="14"
            height="14"
          >
            <circle cx="9" cy="9" r="5.5" />
            <line x1="13.5" y1="13.5" x2="17" y2="17" />
          </svg>
        </span>
        <input
          type="text"
          id="searchInput"
          placeholder="search titles, authors, tags..."
          autocomplete="off"
        />
      </div>
      <nav class="header-nav">
        <button
          class="header-nav-refresh"
          onclick="init()"
          title="Reload library"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
        </button>
        <a href="index.html" class="active">Browse</a>
        <a href="about.html">About</a>
        <a href="settings.html">Settings</a>
        <a href="http://localhost:8001/manager.html">Manager</a>
      </nav>
    </header>

    <div class="page-tabs">
      <button class="page-tab active" id="tabVideos">Videos</button>
      <button class="page-tab" id="tabPlaylists">Playlists</button>
    </div>

    <main class="main-content">
      <!-- Videos Panel -->
      <div id="panelVideos">
        <div class="section-header">
          <h1 class="section-title">All Videos</h1>
          <span class="section-count" id="videoCount">— videos</span>
          <div class="view-toggle" aria-label="Switch view">
            <button
              class="view-toggle-btn active"
              id="btnGridViewVideos"
              title="Grid view"
              aria-pressed="true"
            >
              <svg
                viewBox="0 0 16 16"
                fill="currentColor"
                width="14"
                height="14"
              >
                <rect x="1" y="1" width="6" height="6" rx="1" />
                <rect x="9" y="1" width="6" height="6" rx="1" />
                <rect x="1" y="9" width="6" height="6" rx="1" />
                <rect x="9" y="9" width="6" height="6" rx="1" />
              </svg>
            </button>
            <button
              class="view-toggle-btn"
              id="btnListViewVideos"
              title="List view"
              aria-pressed="false"
            >
              <svg
                viewBox="0 0 16 16"
                fill="currentColor"
                width="14"
                height="14"
              >
                <rect x="1" y="2" width="14" height="3" rx="1" />
                <rect x="1" y="7" width="14" height="3" rx="1" />
                <rect x="1" y="12" width="14" height="3" rx="1" />
              </svg>
            </button>
          </div>
        </div>
        <div class="tag-filter" id="tagFilter"></div>
        <div class="video-grid" id="videoGrid">
          <div class="loading-msg">Loading videos…</div>
        </div>
      </div>

      <!-- Playlists Panel -->
      <div id="panelPlaylists" style="display: none">
        <div class="section-header">
          <h1 class="section-title">Playlists</h1>
          <span class="section-count" id="playlistCount">— playlists</span>
          <div class="view-toggle" aria-label="Switch view">
            <button
              class="view-toggle-btn active"
              id="btnGridViewPlaylists"
              title="Grid view"
              aria-pressed="true"
            >
              <svg
                viewBox="0 0 16 16"
                fill="currentColor"
                width="14"
                height="14"
              >
                <rect x="1" y="1" width="6" height="6" rx="1" />
                <rect x="9" y="1" width="6" height="6" rx="1" />
                <rect x="1" y="9" width="6" height="6" rx="1" />
                <rect x="9" y="9" width="6" height="6" rx="1" />
              </svg>
            </button>
            <button
              class="view-toggle-btn"
              id="btnListViewPlaylists"
              title="List view"
              aria-pressed="false"
            >
              <svg
                viewBox="0 0 16 16"
                fill="currentColor"
                width="14"
                height="14"
              >
                <rect x="1" y="2" width="14" height="3" rx="1" />
                <rect x="1" y="7" width="14" height="3" rx="1" />
                <rect x="1" y="12" width="14" height="3" rx="1" />
              </svg>
            </button>
          </div>
        </div>
        <div class="video-grid" id="playlistGrid">
          <div class="loading-msg">Loading playlists…</div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
