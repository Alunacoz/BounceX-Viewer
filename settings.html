<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings — BounceX Viewer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="site-logo">
        Bounce
        <span>X</span>
      </a>
      <div class="header-search">
        <span class="search-icon">
          <svg
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="14"
            height="14"
          >
            <circle cx="9" cy="9" r="5.5" />
            <line x1="13.5" y1="13.5" x2="17" y2="17" />
          </svg>
        </span>
        <input
          type="text"
          placeholder="search titles, authors, tags..."
          autocomplete="off"
          disabled
          style="opacity: 0.4; cursor: default"
        />
      </div>
      <nav class="header-nav">
        <a href="index.html">Browse</a>
        <a href="about.html">About</a>
        <a href="settings.html" class="active">Settings</a>
        <a href="manager.html" id="managerLink">Manager</a>
      </nav>
    </header>

    <main class="main-content">
      <div class="settings-layout">
        <div class="settings-hero">
          <h1 class="settings-title">User Settings</h1>
          <p class="settings-tagline">
            Customize colors and defaults. Stored in this browser only.
          </p>
        </div>

        <form id="settingsForm" class="settings-form">
          <section class="settings-section">
            <h2 class="settings-section-title">Waveform &amp; ball</h2>
            <div class="settings-grid">
              <label class="settings-row">
                <span class="settings-label">Path color</span>
                <input
                  type="color"
                  id="pathColor"
                  name="pathColor"
                  class="settings-color"
                />
              </label>
              <label class="settings-row">
                <span class="settings-label">Ball color</span>
                <input
                  type="color"
                  id="ballColor"
                  name="ballColor"
                  class="settings-color"
                />
              </label>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="settings-section-title">Top border</h2>
            <div class="settings-grid">
              <label class="settings-row">
                <span class="settings-label">Inactive</span>
                <input
                  type="color"
                  id="topLineInactive"
                  name="topLineInactive"
                  class="settings-color"
                />
              </label>
              <label class="settings-row">
                <span class="settings-label">Active (ball near top)</span>
                <input
                  type="color"
                  id="topLineActive"
                  name="topLineActive"
                  class="settings-color"
                />
              </label>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="settings-section-title">Bottom border</h2>
            <div class="settings-grid">
              <label class="settings-row">
                <span class="settings-label">Inactive</span>
                <input
                  type="color"
                  id="bottomLineInactive"
                  name="bottomLineInactive"
                  class="settings-color"
                />
              </label>
              <label class="settings-row">
                <span class="settings-label">Active (ball near bottom)</span>
                <input
                  type="color"
                  id="bottomLineActive"
                  name="bottomLineActive"
                  class="settings-color"
                />
              </label>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="settings-section-title">
              Defaults when opening a video
            </h2>
            <p class="settings-hint">
              These apply each time you open a new video or playlist.
            </p>
            <div class="settings-checkboxes">
              <label class="settings-check">
                <input
                  type="checkbox"
                  id="defaultOverlay"
                  name="defaultOverlay"
                />
                <span>Overlay mode on</span>
              </label>
              <label class="settings-check">
                <input
                  type="checkbox"
                  id="defaultOverlayBg"
                  name="defaultOverlayBg"
                />
                <span>Overlay background on</span>
              </label>
              <label class="settings-check">
                <input type="checkbox" id="defaultFlipY" name="defaultFlipY" />
                <span>Flip Y on</span>
              </label>
            </div>
            <label class="settings-row settings-row-slider">
              <span class="settings-label">Default zoom</span>
              <input
                type="range"
                id="defaultZoom"
                name="defaultZoom"
                class="settings-zoom-slider"
                min="0.05"
                max="0.5"
                step="0.05"
                value="0.25"
              />
              <span class="settings-zoom-value" id="defaultZoomValue">
                0.25
              </span>
            </label>
            <label class="settings-row settings-row-slider">
              <span class="settings-label">Default path speed</span>
              <input
                type="range"
                id="defaultPathSpeed"
                name="defaultPathSpeed"
                class="settings-zoom-slider"
                min="0.5"
                max="4.0"
                step="0.25"
                value="1.0"
              />
              <span class="settings-zoom-value" id="defaultPathSpeedValue">
                1.0×
              </span>
            </label>
          </section>

          <div class="settings-actions">
            <button type="submit" class="settings-btn settings-btn-primary">
              Save
            </button>
            <button
              type="button"
              id="resetBtn"
              class="settings-btn settings-btn-secondary"
            >
              Reset to defaults
            </button>
            <span class="settings-saved-msg" id="savedMsg"></span>
          </div>
        </form>
      </div>
    </main>

    <script src="nav-config.js"></script>
    <script src="settings.js"></script>
    <script>
      const form = document.getElementById('settingsForm')
      const resetBtn = document.getElementById('resetBtn')
      const defaultZoomEl = document.getElementById('defaultZoom')
      const defaultZoomValue = document.getElementById('defaultZoomValue')
      const defaultPathSpeedEl = document.getElementById('defaultPathSpeed')
      const defaultPathSpeedValue = document.getElementById('defaultPathSpeedValue')

      function hexFromInput(colorInput) {
        return colorInput.value
      }

      function loadSettings() {
        const s = getSettings()
        document.getElementById('pathColor').value = s.pathColor
        document.getElementById('ballColor').value = s.ballColor
        document.getElementById('topLineInactive').value =
          rgbaToHex(s.topLineInactive) || s.topLineInactive || '#ffffff'
        document.getElementById('topLineActive').value = s.topLineActive
        document.getElementById('bottomLineInactive').value =
          rgbaToHex(s.bottomLineInactive) || s.bottomLineInactive || '#ffffff'
        document.getElementById('bottomLineActive').value = s.bottomLineActive
        document.getElementById('defaultOverlay').checked = s.defaultOverlay
        document.getElementById('defaultOverlayBg').checked = s.defaultOverlayBg
        document.getElementById('defaultFlipY').checked = s.defaultFlipY
        document.getElementById('defaultZoom').value = String(s.defaultZoom)
        defaultZoomValue.textContent = s.defaultZoom
        document.getElementById('defaultPathSpeed').value = String(s.defaultPathSpeed)
        defaultPathSpeedValue.textContent = s.defaultPathSpeed + '×'
      }

      function rgbaToHex(rgba) {
        if (!rgba || rgba.startsWith('#')) return rgba
        const m = rgba.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/)
        if (!m) return null
        const r = parseInt(m[1], 10).toString(16).padStart(2, '0')
        const g = parseInt(m[2], 10).toString(16).padStart(2, '0')
        const b = parseInt(m[3], 10).toString(16).padStart(2, '0')
        return '#' + r + g + b
      }

      defaultZoomEl.addEventListener('input', () => {
        defaultZoomValue.textContent = defaultZoomEl.value
      })

      defaultPathSpeedEl.addEventListener('input', () => {
        defaultPathSpeedValue.textContent = defaultPathSpeedEl.value + '×'
      })

      function flashMsg(text) {
        const el = document.getElementById('savedMsg')
        el.textContent = text
        el.classList.remove('visible')
        void el.offsetWidth // force reflow — makes the browser treat it as a fresh element
        el.classList.add('visible')
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault()
        setSettings({
          pathColor: document.getElementById('pathColor').value,
          ballColor: document.getElementById('ballColor').value,
          topLineInactive: document.getElementById('topLineInactive').value,
          topLineActive: document.getElementById('topLineActive').value,
          bottomLineInactive:
            document.getElementById('bottomLineInactive').value,
          bottomLineActive: document.getElementById('bottomLineActive').value,
          defaultOverlay: document.getElementById('defaultOverlay').checked,
          defaultOverlayBg: document.getElementById('defaultOverlayBg').checked,
          defaultFlipY: document.getElementById('defaultFlipY').checked,
          defaultZoom: parseFloat(document.getElementById('defaultZoom').value),
          defaultPathSpeed: parseFloat(document.getElementById('defaultPathSpeed').value),
        })
        defaultZoomValue.textContent =
          document.getElementById('defaultZoom').value
        defaultPathSpeedValue.textContent =
          document.getElementById('defaultPathSpeed').value + '×'
        flashMsg('Saved!')
      })

      resetBtn.addEventListener('click', () => {
        if (!confirm('Reset all settings to defaults?')) return
        resetSettings()
        loadSettings()
        flashMsg('Reset to defaults!')
      })

      loadSettings()
    </script>
  </body>
</html>
